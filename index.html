<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>大智度論 · 卷四十七 · 第一品至第四品 彙整本</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/><style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.8;-webkit-touch-callout:none;}

/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
  color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;letter-spacing:2px;color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;margin-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;
  padding:6px 4px;text-decoration:none;color:var(--sbText);cursor:pointer;
  transition:background .2s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.15);}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  box-shadow:0 0 12px rgba(184,134,11,.7);}
.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;
  border:1px solid rgba(212,196,168,.35);transition:all .2s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:.3px;
  opacity:.86;text-align:center;line-height:1.3;}

/* 主區 */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#f3e9d2;text-align:center;
  padding:72px 24px 60px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:300px;font-weight:900;color:#fff;opacity:.03;
  font-family:"Noto Serif TC",serif;pointer-events:none;white-space:nowrap;}
.site-hero>*{position:relative;z-index:1;}
.hero-title{font-size:56px;font-weight:900;color:var(--goldL);margin:0 0 16px;letter-spacing:4px;}
.hero-subtitle{font-size:20px;color:#e8dcc0;margin:0 0 10px;letter-spacing:2px;}
.hero-range{font-size:17px;color:#c9b896;margin:0 0 8px;letter-spacing:1px;}
.hero-en{font-size:14px;color:#9c8a68;letter-spacing:3px;font-family:"Noto Sans TC",sans-serif;
  text-transform:uppercase;margin-top:14px;}

/* 前言 */
.preface{max-width:880px;margin:46px auto 10px;padding:0 28px;}
.preface-title{font-size:30px;color:var(--accent);text-align:center;margin:0 0 22px;
  letter-spacing:4px;font-weight:700;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-indent:2em;}

/* 總目錄 */
.toc-section{max-width:1100px;margin:40px auto 20px;padding:0 28px;}
.toc-title{font-size:34px;color:var(--accent);text-align:center;margin:0 0 8px;
  letter-spacing:8px;font-weight:700;}
.toc-desc{font-size:17px;color:var(--text-muted);text-align:center;margin:0 0 30px;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:20px 22px;text-decoration:none;
  color:var(--text);box-shadow:0 1px 3px var(--shadow);transition:transform .2s,box-shadow .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(91,58,41,.14);}
.toc-num{flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--gold);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;
  font-family:"Noto Serif TC",serif;}
.toc-body{flex:1;}
.toc-name{font-size:19.5px;font-weight:700;line-height:1.6;color:var(--accent);margin-bottom:6px;}
.toc-sub{font-size:14.5px;color:var(--text-muted);line-height:1.6;font-family:"Noto Sans TC",sans-serif;}

/* 章節（品）區 */
.chapter{margin:40px 0 0;}
.ch-head{background:var(--headGrad);color:#f3e9d2;text-align:center;padding:42px 24px 36px;
  position:relative;}
.ch-num{font-size:18px;color:var(--goldL);letter-spacing:3px;margin-bottom:12px;
  font-family:"Noto Sans TC",sans-serif;}
.ch-name{font-size:34px;font-weight:900;color:#f3e9d2;margin:0 0 10px;letter-spacing:2px;}
.ch-sub{font-size:17px;color:#c9b896;letter-spacing:1px;max-width:760px;margin:0 auto;line-height:1.7;}
.ch-head::after{content:"";display:block;width:80px;height:2px;background:var(--gold);
  margin:20px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 24px 10px;}

/* 橋接 */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;
  margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:8px 0 4px;font-size:17px;color:var(--accent);
  text-decoration:none;font-family:"Noto Sans TC",sans-serif;border-bottom:1px dashed var(--accentL);
  padding-bottom:2px;transition:color .2s;}
.next-link:hover{color:var(--gold);}

/* 進度膠囊 */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;display:flex;
  align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* 回頂 */
#backTop{position:fixed;right:24px;bottom:24px;width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;display:none;
  z-index:120;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:background .2s;}
#backTop:hover{background:var(--gold);}
#sbToggle{display:none;}

/* footer */
.site-footer{background:var(--sbBg);color:#9c8a68;text-align:center;padding:30px 24px;
  margin-top:40px;font-size:15px;letter-spacing:1px;font-family:"Noto Sans TC",sans-serif;}

/* RWD */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:block;position:fixed;top:14px;left:14px;z-index:130;width:42px;height:42px;
    border-radius:8px;background:var(--sbBg);color:var(--gold);border:none;font-size:20px;cursor:pointer;}
  .hero-title{font-size:40px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:32px;}
  .ch-name{font-size:26px;}
}

// 進度
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

// 接近頁尾淡出
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=document.querySelector('[data-wy-notice="v2"]');
  if(f1)targets.push(f1);
  var f2=document.querySelector('.site-footer');
  if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }
})();

// iframe 自動高度
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

// 錨點防錯跳
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);
  if(!el)return;e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();
    var rect=el.getBoundingClientRect();var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});},60);
},true);

var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

// 側欄高亮
var chapters=document.querySelectorAll('.chapter');
var sbItems=document.querySelectorAll('.sb-item');
function highlight(){
  var idx=0;
  chapters.forEach(function(c,i){
    if(c.getBoundingClientRect().top<window.innerHeight*0.35)idx=i;
  });
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
}
window.addEventListener('scroll',highlight,{passive:true});highlight();

// 回頂
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(backTop)backTop.style.display=window.scrollY>600?'block':'none';
},{passive:true});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

// sticky brand 回頂
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});

// 漢堡
var sbToggle=document.getElementById('sbToggle');var sb=document.getElementById('sb');
if(sbToggle&&sb)sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});

// 外層防複製
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);});
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X'))blk(e);
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))blk(e);
  },true);
})();
</script>
<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-47-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
</body></html>
