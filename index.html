<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.9;letter-spacing:.4px;
  padding-left:var(--sbW);
  -webkit-touch-callout:none!important;
}

/* === sidebar === */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;width:0;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;padding:4px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;
  color:var(--sbText);cursor:pointer;padding:4px 4px;border-radius:10px;
  transition:background .25s,transform .2s;width:90%;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-item.active{background:rgba(184,134,11,.22);box-shadow:0 0 14px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;
  color:var(--gold);background:rgba(184,134,11,.06);font-family:"Noto Serif TC",serif;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;}
.sb-label{font-size:11.5px;letter-spacing:1px;text-align:center;line-height:1.25;
  color:var(--sbText);opacity:.92;font-family:"Noto Sans TC",sans-serif;}

#sbToggle{position:fixed;top:12px;left:12px;z-index:200;width:38px;height:38px;
  border-radius:8px;background:var(--sbBg);color:var(--gold);border:1px solid var(--gold);
  font-size:18px;cursor:pointer;display:none;}

/* === 主內容區 === */
.main{max-width:1100px;margin:0 auto;padding:0 28px 60px;}

/* === Hero === */
.site-hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#241c14 0%,#3d3225 50%,#241c14 100%);
  color:#f1e6cc;text-align:center;padding:64px 28px 60px;border-radius:0 0 18px 18px;
  margin:0 0 28px;
}
.site-hero::before{
  content:"般 若";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:"Noto Serif TC",serif;font-size:340px;color:#fff;opacity:.035;
  letter-spacing:30px;pointer-events:none;font-weight:900;
}
.hero-content{position:relative;z-index:2;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;color:var(--goldL);margin:0 0 8px;}
.hero-subtitle{font-size:20px;letter-spacing:6px;opacity:.92;margin:6px 0 3px;color:#e6dbbe;}
.hero-sub{font-size:18px;letter-spacing:3px;opacity:.86;margin:4px 0;color:#d4c4a8;}
.hero-meta{font-size:18px;letter-spacing:3px;opacity:.78;margin:6px 0 12px;}
.hero-range{display:inline-block;font-size:17px;letter-spacing:2.5px;
  border:1px solid rgba(184,134,11,.6);color:var(--goldL);
  padding:6px 22px;border-radius:30px;margin-top:14px;}

/* === Preface === */
.preface{max-width:920px;margin:0 auto 30px;
  background:linear-gradient(135deg,#fffdf5,#f6ecd5);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:12px;padding:28px 36px;box-shadow:0 2px 12px rgba(91,58,41,.06);}
.preface h2{font-size:30px;color:var(--accent);text-align:center;margin:0 0 18px;letter-spacing:3px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 14px;text-indent:2em;}
.preface p:last-child{margin-bottom:0;}

/* === 總目錄 === */
.toc-section{max-width:1100px;margin:32px auto 28px;padding:0 4px;}
.toc-title{font-size:34px;text-align:center;color:var(--accent);letter-spacing:6px;margin:6px 0 6px;}
.toc-desc{font-size:17px;text-align:center;color:var(--text-muted);letter-spacing:2px;margin:0 0 20px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px 22px;text-decoration:none;color:var(--text);
  display:flex;align-items:flex-start;gap:14px;transition:all .25s;
  box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.13);
  border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--gold);color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;
  background:rgba(184,134,11,.06);}
.toc-name{font-size:19.5px;line-height:1.7;color:var(--text);}

/* === 章節（每品） === */
.chapter{margin:48px 0 36px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;
  padding:44px 24px 36px;border-radius:14px 14px 0 0;position:relative;}
.ch-head::after{content:"";position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
  width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:5px;
  color:var(--goldL);margin:0 0 6px;}
.ch-name{font-size:34px;font-weight:900;letter-spacing:4px;margin:6px 0;}
.ch-sub{font-size:17px;letter-spacing:3px;color:#d4c4a8;margin:6px 0 0;}
.ch-body{background:#fffdf7;border:1px solid var(--border);border-top:0;
  border-radius:0 0 14px 14px;padding:32px 30px 30px;}

/* === 橋接 === */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}

/* === iframe === */
.ch-frame{display:block;width:100%;border:0;
  background:#fffdf7;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;margin-top:8px;font-size:17px;
  color:var(--accent);text-decoration:none;letter-spacing:2px;
  padding:8px 18px;border:1px solid var(--accent);border-radius:24px;
  transition:all .25s;}
.next-link:hover{background:var(--accent);color:#fff;}

/* === 底部進度膠囊 === */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;
}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

#backTop{position:fixed;right:18px;bottom:80px;z-index:110;
  width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;
  border:0;font-size:20px;cursor:pointer;display:none;
  box-shadow:0 4px 14px rgba(91,58,41,.3);}

/* === Footer === */
.site-footer{max-width:1100px;margin:48px auto 0;padding:28px 24px 20px;
  text-align:center;border-top:1px solid var(--border);
  color:var(--text-muted);font-size:15px;letter-spacing:2px;line-height:1.9;}
.site-footer p{margin:4px 0;font-size:15px;}

/* === 響應式 === */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  body{padding-left:0;}
  .main{padding:0 16px 60px;}
  .hero-title{font-size:38px;letter-spacing:5px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .ch-body{padding:22px 16px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:32px;}
  .ch-num{font-size:15px;letter-spacing:3px;}
  .ch-name{font-size:22px;}
  .preface{padding:20px 18px;}
  .preface p{font-size:17px;}
}

  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill) rpFill.style.width=pct+'%';
  if(rpPct)  rpPct.textContent =Math.round(pct)+'%';
  // sidebar 高亮
  var chapters=document.querySelectorAll('.chapter');
  var winH=window.innerHeight;var act=-1;
  chapters.forEach(function(c,i){
    var r=c.getBoundingClientRect();
    if(r.top<winH*0.35) act=i;
  });
  document.querySelectorAll('.sb-item').forEach(function(it,i){
    it.classList.toggle('active',i===act);
  });
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

// === 進度條接近頁尾淡出 ===
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=document.querySelector('[data-wy-notice="v2"]');
  if(f1) targets.push(f1);
  var f2=document.querySelector('.site-footer');
  if(f2) targets.push(f2);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  } else {
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh-sb<240);
    };
    window.addEventListener('scroll',check,{passive:true});
    check();
  }
})();

// === iframe 自動高度 ===
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body) return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30) setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);

var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);
});

// === 錨點點擊防錯跳（外層） ===
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A') a=a.parentElement;
  if(!a) return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2) return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

// 持續輪詢 15s
var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();
  if(_rt>50) clearInterval(_riv);
},300);

// === 自動標記問答段落 ===
document.querySelectorAll('.ch-body p').forEach(function(p){
  var t=p.textContent.replace(/^\s+/,'');
  if(/^(問曰：|答曰：)/.test(t)) p.classList.add('qa-3');
  else if(/^(問：|答：)/.test(t)) p.classList.add('qa-2');
});

// === 防複製外層 ===
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12') blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')) blk(e);
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy47dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
